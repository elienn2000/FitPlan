 <div *ngIf="messageService.message$ | async as msg" 
         class="fixed bottom-5 right-5 z-50 px-6 py-4 rounded-lg shadow-xl text-white font-medium transition-all duration-300 animate-fade-in-up"
         [ngClass]="{
           'bg-green-500': msg.type === 'success',
           'bg-red-500': msg.type === 'error',
           'bg-blue-500': msg.type === 'info'
         }">
      <div class="flex items-center gap-2">
        <!-- <span *ngIf="msg.type === 'success'"></span>
        <span *ngIf="msg.type === 'error'"></span>
        <span *ngIf="msg.type === 'info'"></span> -->
        
        <span>{{ msg.text }}</span>
      </div>
    </div>
