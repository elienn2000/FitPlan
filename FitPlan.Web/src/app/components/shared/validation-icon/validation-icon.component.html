@switch (status$ | async) {
@case ('PENDING') {
<svg class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 animate-spin" fill="none"
    viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
</svg>
}
@case ('VALID') {
<svg class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24"
    stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
</svg>
}
@case ('INVALID') {
<div class="group absolute right-3 top-1/2 -translate-y-1/2">
    <svg class="w-5 h-5 text-red-500 cursor-help" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>

    <!-- Tooltip -->
    <div class="absolute bottom-full right-0 mb-2 hidden group-hover:block z-50
                        whitespace-nowrap rounded bg-gray-800 px-3 py-1.5 text-xs text-white shadow-lg">
        {{ errorMessage }}
        <div class="absolute top-full right-2 border-4 border-transparent border-t-gray-800"></div>
    </div>
</div>
}
}
