<div class="card max-w-md mx-auto p-3 bg-white dark:bg-gray-800 rounded-lg shadow-md">

    <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">
        Create an account
    </h2>

    <!-- Progress Bar (solo nei primi 3 step) -->
    @if (currentStep <= 3) { <div class="flex justify-between mb-8 relative">
        <div class="absolute top-1/2 left-0 w-full h-1 bg-gray-200 -z-10 transform -translate-y-1/2"></div>
        <div class="absolute top-1/2 left-0 h-1 bg-blue-600 -z-10 transform -translate-y-1/2 transition-all duration-300"
            [style.width]="(currentStep - 1) * 50 + '%'"></div>

        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold"
            [class]="currentStep >= 1 ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'">1</div>
        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold"
            [class]="currentStep >= 2 ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'">2</div>
        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold"
            [class]="currentStep >= 3 ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'">3</div>
</div>
}

<form [formGroup]="registerForm" class="space-y-4">

    <!-- Account form: first step -->
    <div [class.hidden]="currentStep !== 1" formGroupName="account" class="space-y-4 animate-fade-in">
        <!-- Username and email section -->
        <div>
            <label class="form-label">Username</label>
            <div class="relative">
                <input formControlName="username" class="form-input w-full pr-10" placeholder="Type an username">
                <app-validation-icon [control]="registerForm.get('account.username')"></app-validation-icon>
            </div>
        </div>
        <div>
            <label class="form-label">Email</label>
            <div class="relative">
                <input formControlName="email" type="email" class="form-input w-full" placeholder="Type a valid email">
                <app-validation-icon [control]="registerForm.get('account.email')"></app-validation-icon>
            </div>
        </div>

        <div>
            <label class="form-label">Date of Birth</label>
            <input formControlName="birthDate" type="date" class="form-input w-full">
        </div>
        <button type="button" (click)="nextStep()" [disabled]="accountForm.invalid || accountForm.pending"
            class="btn btn-primary w-full disabled:opacity-50">Next</button>
    </div>


    <!-- Personal Information -->
    <div [class.hidden]="currentStep !== 2" formGroupName="personal" class="space-y-4 animate-fade-in">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="form-label">Name</label>
                <input formControlName="firstName" class="form-input w-full">
            </div>
            <div>
                <label class="form-label">Surname</label>
                <input formControlName="lastName" class="form-input w-full">
            </div>
        </div>

        <div>
            <label class="form-label">Country of Origin</label>
            <div class="relative">
                <select formControlName="country" class="form-input w-full">
                    <option value="" disabled selected>Select a country</option>
                    @for (country of countries; track country) {
                    <option [value]="country">{{ country }}</option>
                    }
                </select>
            </div>
        </div>
        <div class="flex gap-2">
            <button type="button" (click)="prevStep()" class="btn border border-gray-300 w-1/3">Back</button>
            <button type="button" (click)="nextStep()" [disabled]="personalForm.invalid"
                class="btn btn-primary w-2/3 disabled:opacity-50">Next</button>
        </div>
    </div>


    <!-- Security Information (Password) -->
    <div [class.hidden]="currentStep !== 3" formGroupName="security" class="space-y-4 animate-fade-in">
        <div>
            <label class="form-label">Password</label>
            <div class="relative">
                <input formControlName="password" type="password" class="form-input w-full pr-10">
                <app-validation-icon [control]="registerForm.get('security.password')"></app-validation-icon>
            </div>
        </div>
        <div>
            <label class="form-label">Confirm Password</label>
            <div class="relative">
                <input formControlName="confirmPassword" type="password" class="form-input w-full pr-10">
                <app-validation-icon [control]="registerForm.get('security.confirmPassword')"></app-validation-icon>
            </div>
        </div>
        <div class="flex gap-2">
            <button type="button" (click)="prevStep()" class="btn border border-gray-300 w-1/3">Back</button>
            <button type="button" (click)="submitRegistration()" [disabled]="securityForm.invalid || isSubmitting"
                class="btn btn-primary w-2/3 disabled:opacity-50">
                {{ isSubmitting ? 'Creating...' : 'Register' }}
            </button>
        </div>
    </div>


    <!-- Description (Optional, post-registration) -->
    <div [class.hidden]="currentStep !== 4 || !registrationSuccess" formGroupName="profile"
        class="space-y-4 animate-fade-in text-center">
        <div class="text-green-500 text-5xl mb-2">✓</div>
        <h3 class="text-xl font-bold">Account created successfully</h3>
        <p class="text-gray-600 text-sm">Would you like to add a short description to your profile? (Optional)</p>

        <textarea formControlName="description" rows="3" class="form-input w-full mt-4"
            placeholder="Racconta qualcosa di te..."></textarea>

        <div class="flex gap-2 mt-4">
            <button type="button" (click)="skipDescription()"
                class="btn text-gray-500 hover:text-gray-700 w-1/2">Skip</button>
            <button type="button" (click)="submitDescription()" class="btn btn-primary w-1/2">Save and Start</button>
        </div>
    </div>


</form>
</div>
