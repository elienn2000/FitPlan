<!-- PADDING GLOBALE E BACKGROUND -->
<div class="flex flex-col h-screen w-full p-3 md:p-5 gap-4 overflow-hidden [background:var(--bg-app)]">

  <!-- 1. TOPBAR (Ora occupa tutta la larghezza in alto) -->
  <app-topbar 
    class="flex items-center h-20 shrink-0 px-4 rounded-2xl shadow-lg bg-white/10 backdrop-blur-md border border-white/20"
    (toggleMenu)="toggleSidebar()">
  </app-topbar>

  <!-- 2. AREA CENTRALE (Sidebar + Main incastrati in mezzo) -->
  <!-- min-h-0 è cruciale per far funzionare lo scroll interno su Flexbox -->
  <div class="flex flex-1 min-h-0 gap-4 relative">
    
    <!-- BACKDROP MOBILE -->
    <div 
      *ngIf="isMobileSidebarOpen"
      (click)="toggleSidebar()"
      class="fixed inset-0 z-40 bg-gray-900/50 md:hidden rounded-2xl transition-opacity">
    </div>

    <!-- SIDEBAR -->
    <!-- Su mobile è "fixed" (esce dai bordi), su desktop è "relative" (affianca il main) -->
    <app-sidebar 
      class="fixed inset-y-0 left-0 z-50 w-56 transition-transform duration-300 ease-in-out md:relative md:translate-x-0"
      [class.-translate-x-full]="!isMobileSidebarOpen"
      [class.translate-x-0]="isMobileSidebarOpen">
    </app-sidebar>

    <!-- AREA MAIN -->
    <main class="flex-1 overflow-y-auto p-4 rounded-2xl bg-white/30 backdrop-blur-lg border border-white/30 shadow-[0_0_15px_rgba(255,255,255,0.4)]">
      <router-outlet></router-outlet>
    </main>

  </div>

  <!-- 3. FOOTER -->
  <app-footer 
    class="shrink-0 text-center text-sm text-white/70">
  </app-footer>

</div>
