<div class="flex h-screen w-full bg-[var(--color-bg-opaque)] overflow-hidden">

  <!-- BACKDROP (Sfondo scuro semitrasparente solo per Mobile) -->
  <!-- Visibile solo se la sidebar è aperta, cliccandoci si chiude -->
  <div 
    *ngIf="isMobileSidebarOpen"
    (click)="toggleSidebar()"
    class="fixed inset-0 z-40 bg-gray-900 bg-opacity-50 md:hidden transition-opacity">
  </div>

  <!-- SIDEBAR -->
  <!-- 
    Mobile: fixed, absolute (z-50), inizialmente nascosta fuori dallo schermo
    Desktop (md:): relativa, sempre visibile (translate-x-0) 
  -->
  <app-sidebar 
    class="fixed inset-y-0 left-0 z-50 w-64 transition-transform duration-300 ease-in-out md:relative md:translate-x-0"
    [class.-translate-x-full]="!isMobileSidebarOpen"
    [class.translate-x-0]="isMobileSidebarOpen">
  </app-sidebar>

  <!-- CONTENITORE CENTRALE (Topbar + Main + Footer) -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
    
    <!-- TOPBAR: passiamo l'evento al main-layout quando si clicca l'hamburger -->
    <app-topbar 
      class="flex items-center justify-between h-16 bg-white shadow-sm px-4 shrink-0"
      (toggleMenu)="toggleSidebar()">
    </app-topbar>

    <!-- AREA PRINCIPALE: qui dentro andranno le view (es. Dashboard) -->
    <!-- overflow-y-auto permette lo scroll solo in quest'area -->
    <main class="flex-1 overflow-y-auto p-0 md:p-0">
      <router-outlet></router-outlet>
    </main>

    <!-- FOOTER -->
    <app-footer 
      class="bg-white border-t p-4 text-center text-sm text-gray-500 shrink-0">
    </app-footer>
    
  </div>
</div>
